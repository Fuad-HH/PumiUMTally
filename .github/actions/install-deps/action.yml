name: Install Dependencies
description: Install system packages and build/cache project dependencies (Kokkos, EnGPar, Omega_h, Cabana, pumi-pic)

inputs:
  deps-dir:
    description: Directory to install dependencies into
    required: false
    default: ${{ github.workspace }}/deps
  extra-system-packages:
    description: Additional apt packages to install (space-separated)
    required: false
    default: ""

outputs:
  cache-hit:
    description: Whether the dependency cache was hit
    value: ${{ steps.cache-deps.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Install system packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake build-essential \
          gcc-12 g++-12 \
          libmpich-dev \
          zlib1g-dev \
          ${{ inputs.extra-system-packages }}
        echo "MPICH_CC=gcc-12" >> "$GITHUB_ENV"
        echo "MPICH_CXX=g++-12" >> "$GITHUB_ENV"

    - name: Cache dependencies
      uses: actions/cache@v5
      id: cache-deps
      with:
        path: ${{ inputs.deps-dir }}
        key: deps-${{ runner.os }}-gcc12-mpich-kokkos4.7.00-omegah-scorec11.0.0-cabana0.6.1-pumipic

    - name: Build Kokkos
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth 1 --branch 4.7.00 https://github.com/kokkos/kokkos.git /tmp/kokkos
        cmake -S /tmp/kokkos -B /tmp/kokkos/build \
          -DCMAKE_INSTALL_PREFIX=${{ inputs.deps-dir }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-12 \
          -DCMAKE_C_COMPILER=gcc-12 \
          -DKokkos_ENABLE_SERIAL=ON \
          -DKokkos_ENABLE_OPENMP=ON \
          -DBUILD_SHARED_LIBS=ON
        cmake --build /tmp/kokkos/build -j$(nproc)
        cmake --install /tmp/kokkos/build

    - name: Build EnGPar
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth 1 https://github.com/SCOREC/EnGPar.git /tmp/engpar
        cmake -S /tmp/engpar -B /tmp/engpar/build \
          -DCMAKE_INSTALL_PREFIX=${{ inputs.deps-dir }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=mpicxx \
          -DCMAKE_C_COMPILER=mpicc \
          -DENABLE_PARMETIS=OFF \
          -DENABLE_PUMI=OFF \
          -DBUILD_SHARED_LIBS=ON
        cmake --build /tmp/engpar/build -j$(nproc)
        cmake --install /tmp/engpar/build

    - name: Build Omega_h
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth 1 --branch scorec-v11.0.0 https://github.com/SCOREC/omega_h.git /tmp/omega_h
        cmake -S /tmp/omega_h -B /tmp/omega_h/build \
          -DCMAKE_INSTALL_PREFIX=${{ inputs.deps-dir }} \
          -DCMAKE_PREFIX_PATH=${{ inputs.deps-dir }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=mpicxx \
          -DCMAKE_C_COMPILER=mpicc \
          -DOmega_h_USE_Kokkos=ON \
          -DOmega_h_USE_MPI=ON \
          -DOmega_h_USE_ZLIB=ON \
          -DBUILD_SHARED_LIBS=ON
        cmake --build /tmp/omega_h/build -j$(nproc)
        cmake --install /tmp/omega_h/build

    - name: Build Cabana
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth 1 --branch 0.6.1 https://github.com/ECP-CoPA/Cabana.git /tmp/cabana
        cmake -S /tmp/cabana -B /tmp/cabana/build \
          -DCMAKE_INSTALL_PREFIX=${{ inputs.deps-dir }} \
          -DCMAKE_PREFIX_PATH=${{ inputs.deps-dir }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=mpicxx \
          -DCMAKE_C_COMPILER=mpicc \
          -DBUILD_SHARED_LIBS=ON
        cmake --build /tmp/cabana/build -j$(nproc)
        cmake --install /tmp/cabana/build

    - name: Build pumi-pic
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth 1 --branch make_search_class https://github.com/Fuad-HH/pumi-pic.git /tmp/pumi-pic
        cmake -S /tmp/pumi-pic -B /tmp/pumi-pic/build \
          -DCMAKE_INSTALL_PREFIX=${{ inputs.deps-dir }} \
          -DCMAKE_PREFIX_PATH=${{ inputs.deps-dir }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=mpicxx \
          -DCMAKE_C_COMPILER=mpicc \
          -DENABLE_CABANA=ON \
          -DBUILD_SHARED_LIBS=ON
        cmake --build /tmp/pumi-pic/build -j$(nproc)
        cmake --install /tmp/pumi-pic/build
