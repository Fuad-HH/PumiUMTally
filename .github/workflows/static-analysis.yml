name: Static Analysis

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DEPS_DIR: ${{ github.workspace }}/deps

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/install-deps
        with:
          deps-dir: ${{ env.DEPS_DIR }}
          extra-system-packages: clang-tidy-20

      - name: Configure pumi-tally
        run: |
          cmake -S . -B build \
            -DCMAKE_PREFIX_PATH=$DEPS_DIR \
            -DCMAKE_CXX_COMPILER=mpicxx \
            -DCMAKE_C_COMPILER=mpicc \
            -DBUILD_SHARED_LIBS=ON \
            -DPUMITALLYOPENMC_ENABLE_TESTS=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(find . -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) \
            ! -path './.git/*' ! -path './build/*' ! -path './deps/*' ! -path './.*/*')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C++ files found."
            exit 0
          fi

          clang-tidy-20 --version
          clang-tidy-20 -p build "${files[@]}"
