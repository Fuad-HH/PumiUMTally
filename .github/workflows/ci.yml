name: CI

on:
  push:
    branches:
      - physics_kernel

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: physics_kernel

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git build-essential ninja-build openmpi-bin libopenmpi-dev libhdf5-dev

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: $HOME/deps
          key: deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Build Kokkos
        run: |
          git clone https://github.com/kokkos/kokkos.git
          cd kokkos
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/deps/kokkos -DKokkos_ENABLE_SERIAL=ON -DKokkos_ENABLE_OPENMP=ON -DKokkos_ENABLE_MPI=ON
          make -j$(nproc) && make install

      - name: Build Cabana
        run: |
          git clone https://github.com/ECP-copa/Cabana.git
          cd Cabana
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/deps/cabana -DCMAKE_C_COMPILER=$(which mpicc) -DCMAKE_CXX_COMPILER=$(which mpicxx) -DKokkos_ROOT=$HOME/deps/kokkos
          make -j$(nproc) && make install

      - name: Build Omega_h
        run: |
          git clone https://github.com/SCOREC/omega_h.git
          cd omega_h
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/deps/omega_h -DCMAKE_C_COMPILER=$(which mpicc) -DCMAKE_CXX_COMPILER=$(which mpicxx) -DOmega_h_USE_MPI=ON
          make -j$(nproc) && make install

      - name: Build PUMIPIC
        run: |
          export CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH:$HOME/deps/kokkos:$HOME/deps/cabana:$HOME/deps/omega_h
          git clone https://github.com/SCOREC/pumi-pic.git
          cd pumi-pic
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/deps/pumi_pic -DCMAKE_C_COMPILER=$(which mpicc) -DCMAKE_CXX_COMPILER=$(which mpicxx) -DKokkos_ROOT=$HOME/deps/kokkos -DOmega_h_ROOT=$HOME/deps/omega_h -DCabana_ROOT=$HOME/deps/cabana -DENABLE_CABANA=ON
          make -j$(nproc) && make install

      - name: Build PumiUMTally
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_C_COMPILER=$(which mpicc) -DCMAKE_CXX_COMPILER=$(which mpicxx) -Dpumipic_ROOT=$HOME/deps/pumi_pic -DCabana_ROOT=$HOME/deps/cabana -DPUMI_MEASURE_TIME=ON -DHDF5_ROOT=/usr
          make -j$(nproc)
          ctest --output-on-failure -j$(nproc)

